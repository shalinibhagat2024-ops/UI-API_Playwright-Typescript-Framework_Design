name: Publish Allure Report

on:
  workflow_run:
    workflows: ["UI Automation"]
    types:
      - completed

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:
      - name: Download Allure Results
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ui-automation.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: allure-results-shard-1
          path: allure-results

      - name: Download Allure Results Shard 2
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ui-automation.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: allure-results-shard-2
          path: allure-results

      - name: Download Allure Results Shard 3
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ui-automation.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: allure-results-shard-3
          path: allure-results

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Allure
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.34.1/allure-2.34.1.tgz
          tar -xzf allure-2.34.1.tgz
          sudo mv allure-2.34.1 /opt/allure
          sudo ln -sf /opt/allure/bin/allure /usr/local/bin/allure

      - name: Generate Allure Report
        run: |
          allure generate allure-results --clean -o allure-report

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-html-report
          path: allure-report
