name: API Automation Tests

on:
  push:
    branches:
      - shaliniQA

  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        default: "qa"
        type: choice
        options:
          - qa
          - dev
          - prod

      suite:
        description: "API Test Suite"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - smoke
          - regression
          - sanity

jobs:
  api-automation:
    name: API Automation

    runs-on: ubuntu-latest

    timeout-minutes: 30

    env:
      ENV: ${{ github.event.inputs.environment || 'qa' }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Show Execution Configuration
        run: |
          echo "Environment : $ENV"
          echo "Suite       : ${{ github.event.inputs.suite || 'all' }}"

      - name: Execute API Tests
        shell: bash
        run: |
          SUITE="${{ github.event.inputs.suite || 'all' }}"

          COMMAND="npx playwright test --project=api"

          case "$SUITE" in
            smoke)
              COMMAND="$COMMAND --grep @smoke"
              ;;
            regression)
              COMMAND="$COMMAND --grep @regression"
              ;;
            sanity)
              COMMAND="$COMMAND --grep @sanity"
              ;;
            all)
              ;;
          esac

          echo ""
          echo "Executing Command:"
          echo "$COMMAND"
          echo ""

          eval "$COMMAND"

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-api
          path: playwright-report/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: allure-results/
          if-no-files-found: warn
          retention-days: 30
