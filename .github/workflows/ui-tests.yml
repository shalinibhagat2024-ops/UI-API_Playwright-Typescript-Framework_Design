name: UI Automation

on:
  push:
    branches:
      - shaliniQA

  pull_request:
    branches:
      - main

jobs:
  ui-tests:
    name: UI Automation

    runs-on: ubuntu-latest

    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Generate Admin Authentication
        run: npm run auth:admin
        env:
          ENV: qa

      - name: Execute UI Tests
        run: npm run test:ui
        env:
          ENV: qa
