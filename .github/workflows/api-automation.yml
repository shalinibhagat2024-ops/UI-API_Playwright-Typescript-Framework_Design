name: API Automation

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        default: "qa"
        type: choice
        options:
          - qa
          - dev
          - prod

      suite:
        description: "Suite"
        required: true
        default: "regression"
        type: choice
        options:
          - smoke
          - sanity
          - regression
          - all

concurrency:
  group: api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-tests:
    name: API Tests

    runs-on: ubuntu-latest

    timeout-minutes: 30

    env:
      ENV: ${{ github.event.inputs.environment }}
      SUITE: ${{ github.event.inputs.suite }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Make Execute Script Executable
        run: chmod +x .github/scripts/execute-api.sh

      - name: Execute API Tests
        run: .github/scripts/execute-api.sh

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-api-report
          path: playwright-report
          retention-days: 7

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-api-results
          path: allure-results
          retention-days: 7

      - name: Upload Failed Test Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-failed-tests
          path: test-results
          retention-days: 7
