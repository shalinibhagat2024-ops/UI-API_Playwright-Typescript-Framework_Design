name: UI Automation

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        default: "qa"
        type: choice
        options:
          - qa
          - dev
          - prod

      browser:
        description: "Browser"
        required: true
        default: "chromium"
        type: choice
        options:
          - chromium
          - firefox
          - webkit

      suite:
        description: "Suite"
        required: true
        default: "regression"
        type: choice
        options:
          - smoke
          - sanity
          - regression
          - all

concurrency:
  group: ui-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-tests:
    name: UI Tests (Shard ${{ matrix.shard }})

    runs-on: ubuntu-latest

    timeout-minutes: 60

    strategy:
      fail-fast: false

      matrix:
        shard:
          - 1/3
          - 2/3
          - 3/3

    env:
      ENV: ${{ github.event.inputs.environment }}
      BROWSER: ${{ github.event.inputs.browser }}
      SUITE: ${{ github.event.inputs.suite }}
      SHARD: ${{ matrix.shard }}

      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Generate Authentication
        run: npm run chromium-auth

      - name: Make Execute Script Executable
        run: chmod +x .github/scripts/execute-ui.sh

      - name: Execute UI Tests
        run: .github/scripts/execute-ui.sh

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.shard }}
          path: playwright-report
          retention-days: 7

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.shard }}
          path: allure-results
          retention-days: 7

      - name: Upload Test Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-tests-${{ matrix.shard }}
          path: test-results
          retention-days: 7
