name: UI Automation

on:
  push:
    branches:
      - shaliniQA

  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        default: "qa"
        type: choice
        options:
          - qa
          - dev
          - prod

      browser:
        description: "Browser"
        required: true
        default: "chromium"
        type: choice
        options:
          - chromium
          - firefox
          - webkit

      suite:
        description: "Test Suite"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - smoke
          - regression
          - sanity

jobs:
  ui-automation:
    name: UI Automation

    runs-on: ubuntu-latest

    timeout-minutes: 60

    env:
      ENV: ${{ github.event.inputs.environment || 'qa' }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Generate Admin Authentication
        run: npm run auth:admin

      - name: Show Selected Options
        run: |
          echo "Environment : $ENV"
          echo "Browser     : ${{ github.event.inputs.browser || 'chromium' }}"
          echo "Suite       : ${{ github.event.inputs.suite || 'all' }}"

      - name: Execute UI Tests
        run: npm run test:ui:auth

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: warn
          retention-days: 30
